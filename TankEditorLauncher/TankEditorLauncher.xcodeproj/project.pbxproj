			shellPath = /bin/sh;
			shellScript = "#!/bin/bash\nset -e\n\necho \"=======================\"\necho \"🔨 BUILD & INSTALL LIBS\"\necho \"=======================\"\n\n###############################\n# 1. ПУТИ\n###############################\n\nENGINE_DIR=\"$PROJECT_DIR/../TankEngine2D\"\nUSERCODE_DIR=\"$PROJECT_DIR/../UserCodeDylib\"\n\nAPP_FRAMEWORKS=\"$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/Frameworks\"\n\nREAL_ENGINE_LIB=\"$ENGINE_DIR/.build/arm64-apple-macosx/debug/libTankEngine2DDynamic.dylib\"\nREAL_USERCODE_LIB=\"$USERCODE_DIR/.build/arm64-apple-macosx/debug/libUserCodeDylib.dylib\"\n\n\n###############################\n# 2. Собираем движок + юзер код\n###############################\n\necho \"📦 Building Engine dylib...\"\nswift build --package-path \"$ENGINE_DIR\" -c debug --product TankEngine2DDynamic\n\necho \"📦 Building UserCode dylib...\"\nswift build --package-path \"$USERCODE_DIR\" -c debug --product UserCodeDylib\n\n\n###############################\n# 3. Чистим мусорные фреймворки\n###############################\n\necho \"🧹 Removing SPM fake frameworks & fake dylibs...\"\n\nfind \"$BUILT_PRODUCTS_DIR\" -name \"TankEngine2DDynamic.framework\" -exec rm -rf {} + 2>/dev/null || true\nfind \"$BUILT_PRODUCTS_DIR\" -name \"libTankEngine2DDynamic.dylib\" -exec rm -rf {} + 2>/dev/null || true\n\n\n###############################\n# 4. Копируем настоящие dylib\n###############################\n\necho \"📁 Installing to App: $APP_FRAMEWORKS\"\nmkdir -p \"$APP_FRAMEWORKS\"\n\necho \"➡️ Copy Engine dylib\"\ncp -f \"$REAL_ENGINE_LIB\" \"$APP_FRAMEWORKS/\"\n\necho \"➡️ Copy UserCode dylib\"\ncp -f \"$REAL_USERCODE_LIB\" \"$APP_FRAMEWORKS/\"\n\n\n###############################\n# 5. Подписываем обе dylib\n###############################\n\necho \"🔏 Signing dylibs...\"\ncodesign --force --deep --sign - \"$APP_FRAMEWORKS/libTankEngine2DDynamic.dylib\"\ncodesign --force --deep --sign - \"$APP_FRAMEWORKS/libUserCodeDylib.dylib\"\n\n\necho \"✅ DONE: Engine + UserCode installed\"\necho \"=======================\"\n\n";
		};
